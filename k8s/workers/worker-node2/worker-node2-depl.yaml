apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-node2
  labels:
    app: worker-node2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-node2
  template:
    metadata:
      name: worker-node2
      labels:
        app: worker-node2
    spec:
      containers:
        - name: worker-node2
          image: nginx
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
      